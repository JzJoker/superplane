name: Frontend Tests

# Runs the web_src (Vitest) test suite on your fork so you get a green/red
# check on pushes and PRs without depending on the upstream Semaphore project.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
