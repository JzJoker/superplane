name: Preview on /test comment

on:
  issue_comment:
    types: [created]

jobs:
  deploy-preview:
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/test'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Trigger Render preview deploy
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' \
            | jq .

      - name: Comment with status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview deploy triggered for branch \`${{ steps.pr.outputs.branch }}\`. Check [Render dashboard](https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}) for the preview URL.`
            });
